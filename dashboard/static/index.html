<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Equities Trading Firm — Read-Only Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0e1117; --panel: #161b22; --border: #2a2f37; --fg: #e6edf3; --muted: #8b949e;
    --green: #2ea043; --red: #d1242f; --accent: #388bfd; --paper: #9e6a03;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f6f8fa; --panel:#fff; --border:#d0d7de; --fg:#1f2328; --muted:#57606a;
            --green:#1a7f37; --red:#cf222e; --accent:#0969da; --paper:#9a6700; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 14px/1.4 -apple-system, Segoe UI, Roboto, sans-serif; }
  .banner { padding: 8px 16px; font-weight: 600; text-align: center; }
  .banner.paper { background: var(--paper); color: #fff; }
  .banner.failover { background: var(--red); color: #fff; }
  header h1 { font-size: 18px; margin: 16px; }
  .grid { display: grid; gap: 16px; padding: 0 16px 32px;
          grid-template-columns: repeat(2, minmax(0,1fr)); }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
           padding: 14px; overflow: hidden; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em;
              color: var(--muted); margin: 0 0 12px; }
  .stale { outline: 2px solid var(--red); }
  .agents { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 8px; }
  .agent { border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
  .agent .name { font-weight: 600; font-size: 12px; }
  .agent .state { font-size: 11px; text-transform: uppercase; }
  .state.idle { color: var(--muted); } .state.running { color: var(--accent); }
  .state.error, .state.blocked { color: var(--red); } .state.failover { color: var(--paper); }
  .agent .summary { font-size: 11px; color: var(--muted); margin-top: 4px;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent .model { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .agent .model.fallback { color: var(--paper); font-weight: 600; }
  .strip { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px; font-size: 12px; }
  .strip .chip { border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; }
  .strip .chip.red { border-color: var(--red); color: var(--red); }
  .cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  .card { border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  .card .lbl { font-size: 11px; color: var(--muted); }
  .card .big { font-size: 20px; font-weight: 700; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border); }
  .ranges button, .navbtn { background: transparent; border: 1px solid var(--border);
      color: var(--fg); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: 12px; }
  .ranges button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cal { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal .cell { aspect-ratio: 1; border-radius: 5px; border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 10px; cursor: pointer; }
  .cal .cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .muted { color: var(--muted); }
  .flowline { font-size: 11px; color: var(--muted); margin-top: 8px;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = "";

async function getJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(path + " " + r.status);
  return r.json();
}
const money = (n) => (n < 0 ? "-$" : "$") + Math.abs(n ?? 0).toFixed(2);
const pct = (n) => ((n ?? 0) * 100).toFixed(2) + "%";
const cls = (n) => (n > 0 ? "pos" : n < 0 ? "neg" : "");

function usePoll(fn, ms, deps = []) {
  const [data, setData] = useState(null);
  const [stale, setStale] = useState(false);
  useEffect(() => {
    let live = true;
    const tick = () => fn().then(d => { if (live) { setData(d); setStale(false); } })
                          .catch(() => { if (live) setStale(true); });
    tick();
    const id = setInterval(tick, ms);
    return () => { live = false; clearInterval(id); };
  }, deps);
  return [data, stale];
}

const AGENT_ORDER = ["orchestrator","scanner","research_technical","research_fundamental",
  "research_sentiment","research_macro","edge_aggregator","portfolio_construct",
  "risk_manager_flagging","execution","exit_monitor","auditor_calibration"];

function AgentBoard() {
  const [data, stale] = usePoll(() => getJSON("/api/agents/status"), 3000);
  const [g] = usePoll(() => getJSON("/api/guardrails"), 3000);
  const [flow, setFlow] = useState([]);
  useEffect(() => {
    let ws;
    try {
      ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws/agents");
      ws.onmessage = (e) => {
        const ev = JSON.parse(e.data);
        if (ev.type === "signal_flow") setFlow(f => [`${ev.stage}:${ev.symbol} ${ev.detail}`, ...f].slice(0, 6));
      };
    } catch (_) {}
    return () => { if (ws) ws.close(); };
  }, []);
  const byName = {}; (data?.agents || []).forEach(a => byName[a.agent_name] = a);
  const anyFailover = (data?.failovers || []).length > 0;
  return (
    <div className={"panel" + (stale ? " stale" : "")}>
      <h2>Panel A · Live Agent Activity {stale && <span className="neg">· stale</span>}</h2>
      <div className="agents">
        {AGENT_ORDER.map(name => {
          const a = byName[name] || { state: "idle" };
          const fallback = a.active_model && a.active_model !== "claude-fable-5";
          return (
            <div className="agent" key={name}>
              <div className="name">{name}</div>
              <div className={"state " + (a.state || "idle")}>{a.state || "idle"}</div>
              <div className="summary">{a.summary || "—"}</div>
              <div className={"model" + (fallback ? " fallback" : "")}>{a.active_model || "—"}</div>
            </div>
          );
        })}
      </div>
      {g && (
        <div className="strip">
          <span className={"chip" + (g.current.open_positions >= g.limits.max_concurrent_positions ? " red" : "")}>
            positions {g.current.open_positions}/{g.limits.max_concurrent_positions}</span>
          <span className={"chip" + (g.current.worst_daily_loss >= g.limits.max_daily_loss_pct ? " red" : "")}>
            daily loss {pct(g.current.worst_daily_loss)} / {pct(g.limits.max_daily_loss_pct)}</span>
          <span className={"chip" + (g.current.drawdown >= g.limits.max_drawdown_halt_pct ? " red" : "")}>
            drawdown {pct(g.current.drawdown)} / {pct(g.limits.max_drawdown_halt_pct)}</span>
          <span className="chip">min conf {g.limits.min_signal_confidence_to_trade}</span>
        </div>
      )}
      <div className="flowline">flow: {flow.join("  ·  ") || "waiting for live signal events…"}</div>
    </div>
  );
}

function EquityChart() {
  const [range, setRange] = useState("ALL");
  const [data, stale] = usePoll(() => getJSON("/api/equity?range=" + range), 5000, [range]);
  const pts = data?.points || [];
  const W = 560, H = 220, pad = 30;
  let path = "", hwmY = null, area = "";
  if (pts.length) {
    const eq = pts.map(p => p.total_equity);
    const hwm = Math.max(...pts.map(p => p.high_water_mark || 0), ...eq);
    const lo = Math.min(...eq, ...pts.map(p => p.high_water_mark || eq[0]));
    const span = (hwm - lo) || 1;
    const x = (i) => pad + (i / Math.max(pts.length - 1, 1)) * (W - 2 * pad);
    const y = (v) => H - pad - ((v - lo) / span) * (H - 2 * pad);
    path = eq.map((v, i) => (i ? "L" : "M") + x(i) + " " + y(v)).join(" ");
    area = path + ` L ${x(eq.length - 1)} ${H - pad} L ${x(0)} ${H - pad} Z`;
    hwmY = y(hwm);
  }
  return (
    <div className={"panel" + (stale ? " stale" : "")}>
      <h2>Panel B · Account Equity {data?.is_paper && <span style={{color:"var(--paper)"}}>· PAPER</span>}</h2>
      <div className="ranges">
        {["1D","1W","1M","3M","YTD","ALL"].map(r =>
          <button key={r} className={r === range ? "active" : ""} onClick={() => setRange(r)}>{r}</button>)}
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",marginTop:8}}>
        {pts.length ? <>
          <path d={area} fill="var(--accent)" opacity="0.12" />
          <path d={path} fill="none" stroke="var(--accent)" strokeWidth="2" />
          {hwmY !== null && <line x1={pad} x2={W-pad} y1={hwmY} y2={hwmY}
             stroke="var(--muted)" strokeDasharray="4 4" />}
        </> : <text x={W/2} y={H/2} textAnchor="middle" fill="var(--muted)">no equity data yet</text>}
      </svg>
      {pts.length > 0 && <div className="muted">
        latest {money(pts[pts.length-1].total_equity)} · HWM {money(pts[pts.length-1].high_water_mark)}
        · {pts.length} snapshots</div>}
    </div>
  );
}

function Calendar() {
  const [month, setMonth] = useState(null);
  const [data, stale] = usePoll(() => getJSON("/api/calendar" + (month ? "?month=" + month : "")), 8000, [month]);
  const [day, setDay] = useState(null);
  const m = data?.month;
  const days = {}; (data?.days || []).forEach(d => days[d.trading_date] = d);
  const mtd = (data?.days || []).reduce((s, d) => s + (d.total_pnl || 0), 0);
  let cells = [];
  if (m) {
    const [y, mm] = m.split("-").map(Number);
    const first = new Date(Date.UTC(y, mm - 1, 1));
    const dim = new Date(Date.UTC(y, mm, 0)).getUTCDate();
    for (let i = 0; i < first.getUTCDay(); i++) cells.push(null);
    for (let d = 1; d <= dim; d++) cells.push(`${y}-${String(mm).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
  }
  const color = (v) => v == null ? "transparent"
    : v > 0 ? `rgba(46,160,67,${Math.min(0.85, 0.25 + Math.abs(v)/20)})`
    : v < 0 ? `rgba(209,36,47,${Math.min(0.85, 0.25 + Math.abs(v)/20)})` : "var(--border)";
  const shift = (delta) => {
    const [y, mm] = (m || "2026-06").split("-").map(Number);
    const d = new Date(Date.UTC(y, mm - 1 + delta, 1));
    setMonth(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}`);
  };
  return (
    <div className={"panel" + (stale ? " stale" : "")}>
      <h2>Panel C · Trading Calendar</h2>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button className="navbtn" onClick={() => shift(-1)}>‹</button>
        <span>{m || "—"} · MTD <b className={cls(mtd)}>{money(mtd)}</b></span>
        <button className="navbtn" onClick={() => shift(1)}>›</button>
      </div>
      <div className="cal">
        {["S","M","T","W","T","F","S"].map((d,i) => <div key={"h"+i} className="muted" style={{textAlign:"center",fontSize:10}}>{d}</div>)}
        {cells.map((date, i) => {
          if (!date) return <div key={i} className="cell empty" />;
          const d = days[date];
          return <div key={i} className="cell" style={{background: color(d ? d.total_pnl : null)}}
                      onClick={() => d && setDay(date)}>
            <span>{Number(date.slice(-2))}</span>
            {d && <span style={{fontSize:9}}>{money(d.total_pnl)}</span>}
          </div>;
        })}
      </div>
      {day && <DayDetail date={day} onClose={() => setDay(null)} />}
    </div>
  );
}

function DayDetail({ date, onClose }) {
  const [data] = usePoll(() => getJSON("/api/day/" + date), 100000, [date]);
  return (
    <div style={{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <b>{date}</b><button className="navbtn" onClick={onClose}>close</button></div>
      <table><thead><tr><th>Symbol</th><th>Entry</th><th>Exit</th><th>Reason</th><th>P&L</th></tr></thead>
        <tbody>{(data?.trades || []).map((t,i) =>
          <tr key={i}><td>{t.symbol}</td><td>{money(t.entry_price)}</td>
            <td>{t.exit_price ? money(t.exit_price) : "—"}</td><td>{t.exit_reason || "open"}</td>
            <td className={cls(t.realized_pnl)}>{t.realized_pnl != null ? money(t.realized_pnl) : "—"}</td></tr>)}
        </tbody></table>
    </div>
  );
}

function Spark({ values }) {
  if (!values || values.length < 2) return <span className="muted">—</span>;
  const W = 120, H = 30, lo = Math.min(...values), hi = Math.max(...values), span = (hi-lo)||1;
  const d = values.map((v,i) => (i?"L":"M") + (i/(values.length-1)*W) + " " + (H - (v-lo)/span*H)).join(" ");
  return <svg viewBox={`0 0 ${W} ${H}`} width={W} height={H}><path d={d} fill="none" stroke="var(--accent)" strokeWidth="1.5"/></svg>;
}

function PnL() {
  const [data, stale] = usePoll(() => getJSON("/api/pnl/summary"), 5000);
  const blocks = data ? [data.today, data.week, data.month, data.year] : [];
  return (
    <div className={"panel" + (stale ? " stale" : "")}>
      <h2>Panel D · P&L Breakdown {data?.is_paper && <span style={{color:"var(--paper)"}}>· PAPER</span>}</h2>
      <div className="cards">
        {blocks.map((b,i) => b && (
          <div className="card" key={i}>
            <div className="lbl">{b.label}</div>
            <div className={"big " + cls(b.total_pnl)}>{money(b.total_pnl)}</div>
            <div className="muted">{pct(b.total_pnl_pct)} · {b.trades_closed} closed · win {pct(b.win_rate)}</div>
            <div className="muted">best {money(b.best_trade)} · worst {money(b.worst_trade)}</div>
            <Spark values={b.sparkline} />
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [g] = usePoll(() => getJSON("/api/guardrails"), 5000);
  const [agents] = usePoll(() => getJSON("/api/agents/status"), 5000);
  const failover = (agents?.failovers || []).length > 0;
  return (
    <div>
      <div className={"banner " + (g && !g.paper_trading ? "" : "paper")}>
        {g == null ? "connecting…" : g.paper_trading
          ? "PAPER TRADING — no real orders · approval mode: " + g.order_approval_mode + " (on Robinhood)"
          : "LIVE TRADING — real money · approval on Robinhood"}
      </div>
      {failover && <div className="banner failover">⚠ An agent is running on a FAILOVER model (not Fable 5)</div>}
      <header><h1>Equities Trading Firm — Read-Only Dashboard</h1></header>
      <div className="grid">
        <AgentBoard /><EquityChart /><Calendar /><PnL />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
