# Local PostgreSQL for V2 prototype/paper runs (Section 17: bound to 127.0.0.1 only).
# POSTGRES_PASSWORD comes from .env (gitignored); .env.example has the placeholder.
services:
  postgres:
    image: postgres:16-alpine
    container_name: options-v2-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: options_v2
      POSTGRES_USER: options
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U options -d options_v2"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
